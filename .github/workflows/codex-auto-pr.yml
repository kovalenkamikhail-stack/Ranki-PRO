name: Codex Feature Branch PR

on:
  push:
    branches:
      - 'codex/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR for codex branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace("refs/heads/", "");
            const base = "main";
            const commit = context.payload.head_commit || {};
            const rawMessage = (commit.message || head).trim();
            const title = (rawMessage.split("\n")[0] || head).slice(0, 250);

            const bodyLines = [
              "This PR was created or updated automatically for a Codex feature branch.",
              "",
              `Branch: \`${head}\``,
              commit.id ? `Head commit: \`${commit.id.slice(0, 7)}\`` : "",
              rawMessage ? `Latest commit: ${rawMessage}` : "",
              context.payload.compare ? `Compare: ${context.payload.compare}` : "",
            ].filter(Boolean);

            const mergedMatches = await github.rest.pulls.list({
              owner,
              repo,
              state: "closed",
              head: `${owner}:${head}`,
              base,
              per_page: 20,
            });

            const alreadyMerged = mergedMatches.data.find((pull) => {
              return pull.merged_at && pull.head?.sha === context.sha;
            });

            if (alreadyMerged) {
              core.info(
                `Skipping PR creation because PR #${alreadyMerged.number} already merged head ${context.sha.slice(0, 7)} into ${base}.`
              );
              core.setOutput("skip", "true");
              core.setOutput("number", String(alreadyMerged.number));
              core.setOutput("html_url", alreadyMerged.html_url);
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
              per_page: 1,
            });

            let pr;

            if (existing.data.length > 0) {
              pr = existing.data[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body: bodyLines.join("\n"),
              });
              core.info(`Updated existing PR #${pr.number}`);
            } else {
              pr = (
                await github.rest.pulls.create({
                  owner,
                  repo,
                  head,
                  base,
                  title,
                  body: bodyLines.join("\n"),
                  maintainer_can_modify: true,
                })
              ).data;
              core.info(`Created PR #${pr.number}`);
            }

            core.setOutput("number", String(pr.number));
            core.setOutput("node_id", pr.node_id);
            core.setOutput("html_url", pr.html_url);
            core.setOutput("skip", "false");

      - name: Enable auto-merge
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          PR_NODE_ID: ${{ steps.pr.outputs.node_id }}
        with:
          script: |
            const pullRequestId = process.env.PR_NODE_ID;

            if (!pullRequestId) {
              core.warning("No PR node id returned from create/update step.");
              return;
            }

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: {
                        pullRequestId: $pullRequestId,
                        mergeMethod: SQUASH
                      }
                    ) {
                      clientMutationId
                    }
                  }
                `,
                { pullRequestId }
              );
              core.info("Auto-merge enabled.");
            } catch (error) {
              core.warning(`Auto-merge was not enabled: ${error.message}`);
            }

      - name: Wait for merge and send Telegram notification
        if: steps.pr.outputs.skip != 'true'
        continue-on-error: true
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.parse
          import urllib.request

          pr_number = os.environ.get("PR_NUMBER", "").strip()
          repo = os.environ.get("REPO", "").strip()
          github_token = os.environ.get("GITHUB_TOKEN", "").strip()
          telegram_token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()

          if not pr_number or not repo:
              print("Missing PR context. Skipping Telegram merge notification.")
              sys.exit(0)

          if not telegram_token or not chat_id:
              print("Telegram secrets are not configured. Skipping notification.")
              sys.exit(0)

          def github_get(url: str):
              headers = {
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {github_token}",
                  "User-Agent": "ranki-pro-codex-auto-pr",
              }
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          def send_message(text: str) -> None:
              data = urllib.parse.urlencode(
                  {
                      "chat_id": chat_id,
                      "text": text,
                      "disable_web_page_preview": "true",
                  }
              ).encode()

              with urllib.request.urlopen(
                  f"https://api.telegram.org/bot{telegram_token}/sendMessage",
                  data=data,
              ) as response:
                  response.read()

          def format_files(files):
              if not files:
                  return "(no file list provided)"

              shown = files[:20]
              files_block = "\n".join(shown)
              if len(files) > 20:
                  files_block += f"\n... and {len(files) - 20} more"
              return files_block

          pull_url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}"
          pull = None

          for _ in range(60):
              pull = github_get(pull_url)
              if pull.get("merged_at") and pull.get("base", {}).get("ref") == "main":
                  break
              time.sleep(5)
          else:
              print(
                  f"PR #{pr_number} did not merge into main during the polling window. "
                  "Skipping Telegram merge notification."
              )
              sys.exit(0)

          files_response = github_get(f"{pull_url}/files")
          file_items = []
          for file_item in files_response[:20]:
              status = file_item.get("status", "modified")
              prefix = {
                  "added": "+",
                  "modified": "~",
                  "removed": "-",
                  "renamed": "R",
              }.get(status, "~")
              filename = file_item.get("filename", "(unknown file)")
              file_items.append(f"{prefix} {filename}")

          merge_commit_sha = pull.get("merge_commit_sha", "") or ""
          title = (pull.get("title") or "").strip() or "(no title)"
          head_ref = pull.get("head", {}).get("ref", "")
          merged_by = (pull.get("merged_by") or {}).get("login", "unknown")
          pr_url = pull.get("html_url", "")
          commit_url = (
              f"https://github.com/{repo}/commit/{merge_commit_sha}"
              if merge_commit_sha
              else ""
          )

          text = "\n".join(
              [
                  f"Repo: {repo}",
                  "Branch: main",
                  f"PR: #{pr_number}",
                  f"Head Branch: {head_ref}",
                  f"Merge Commit: {merge_commit_sha[:7] if merge_commit_sha else '(unknown)'}",
                  f"Merged By: {merged_by}",
                  f"Message: {title}",
                  "Files:",
                  format_files(file_items),
                  f"PR URL: {pr_url}",
                  f"Commit URL: {commit_url}",
              ]
          )

          send_message(text)
          PY
