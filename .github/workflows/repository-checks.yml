name: Repository Checks

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required project files exist
        run: |
          test -f AGENTS.md
          test -f .codex/config.toml
          test -f docs/product/PRD-Offline-Flashcards-2026-03-07.md
          test -f docs/product/ranki-mvp-brief.md
          test -f .github/workflows/codex-auto-pr.yml
          test -f .github/workflows/telegram-commits.yml

      - name: Verify PRD mentions offline-first scope
        run: |
          grep -q "offline-first" docs/product/PRD-Offline-Flashcards-2026-03-07.md
          grep -q "local-only" docs/product/ranki-mvp-brief.md
