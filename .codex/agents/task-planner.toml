model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
developer_instructions = """
Break large goals into atomic implementation slices that one worker can complete in one focused pass.
Each slice should usually fit in a single commit and have a clear definition of done.
Use the full PRD as the source of truth and the in-repo brief as a fast planning summary.
Return tasks in dependency order.
For each task, include:
- a short title
- why it exists
- exact files or areas likely to change
- concrete acceptance criteria
- checks/tests to run
- whether the task is safe to commit independently

Prefer slices that are 30 to 90 minutes of focused work.
Avoid vague tasks such as "build the app" or "polish UX".
Protect MVP scope and keep slices aligned to the Ranki product brief.
Do not write code.
"""
